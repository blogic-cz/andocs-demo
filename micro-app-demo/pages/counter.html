<title>Counter App</title>

<main
  x-data="{ count: 0, step: 1 }"
  class="micro-app-shell mx-auto max-w-md"
>
  <!-- Header -->
  <div class="space-y-1.5 px-8 pt-8 pb-5">
    <div class="flex items-center justify-between">
      <h1 class="micro-app-title">Counter</h1>
      <span class="micro-app-badge"
        >Alpine.js + Tailwind</span
      >
    </div>
    <p class="micro-app-subtitle">
      Interactive micro-app embedded via
      <code
        class="rounded px-1 py-0.5 font-mono text-xs"
        style="background: var(--muted)"
        >andocs-app</code
      >
      block with shared.css styling.
    </p>
  </div>

  <hr class="micro-app-divider" style="margin: 0" />
  <!-- Counter display -->
  <div
    class="micro-app-section mx-8 mt-6"
    style="text-align: center; padding: 32px 24px"
  >
    <span class="micro-app-label">Current value</span>
    <p class="micro-app-value" x-text="count"></p>
  </div>
  <!-- Controls -->
  <div class="space-y-4 px-8 pt-6">
    <div class="grid grid-cols-2 gap-3">
      <button
        type="button"
        @click="count += step"
        class="micro-app-btn micro-app-btn-primary"
      >
        Increment
      </button>
      <button
        type="button"
        @click="count = Math.max(0, count - step)"
        class="micro-app-btn micro-app-btn-secondary"
      >
        Decrement
      </button>
    </div>
    <!-- Step selector -->
    <div class="flex items-center gap-3">
      <span
        class="micro-app-label"
        style="margin-bottom: 0; flex-shrink: 0"
        >Step</span
      >
      <div class="flex flex-1 gap-2">
        <button
          type="button"
          @click="step = 1"
          :data-active="step === 1 ? 'true' : 'false'"
          class="micro-app-btn micro-app-btn-ghost flex-1"
        >
          1
        </button>
        <button
          type="button"
          @click="step = 5"
          :data-active="step === 5 ? 'true' : 'false'"
          class="micro-app-btn micro-app-btn-ghost flex-1"
        >
          5
        </button>
        <button
          type="button"
          @click="step = 10"
          :data-active="step === 10 ? 'true' : 'false'"
          class="micro-app-btn micro-app-btn-ghost flex-1"
        >
          10
        </button>
      </div>
    </div>
  </div>

  <hr class="micro-app-divider" style="margin: 20px 32px" />
  <!-- Footer -->
  <div class="flex items-center justify-between px-8 pb-7">
    <span class="micro-app-subtitle">
      Step: <strong x-text="step"></strong>
    </span>
    <button
      type="button"
      @click="count = 0; step = 1"
      class="micro-app-btn micro-app-btn-ghost"
      style="font-size: 0.75rem"
    >
      Reset
    </button>
  </div>
</main>
